spring.application.name=jci

# Database - uses Render env variables in production, falls back to local values
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jci_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:123456}
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

server.port=8080

# Actuator for UptimeRobot
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never